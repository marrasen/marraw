name: release

on:
  push:
    tags: ['v*']
  # Build an installer without publishing, to check the pipeline is healthy.
  workflow_dispatch:

# Needed to create the GitHub Release and upload assets to it.
permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  LIBRAW_VERSION: '0.22.1'
  NODE_VERSION: '24'

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # A tag whose version disagrees with package.json would publish an
      # installer that electron-updater's latest.yml never points at.
      - name: Check tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $tag = '${{ github.ref_name }}' -replace '^v', ''
          $pkg = (Get-Content package.json -Raw | ConvertFrom-Json).version
          if ($tag -ne $pkg) {
            throw "tag v$tag does not match package.json version $pkg"
          }
          Write-Host "releasing $pkg"

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json

      # cgo and the LibRaw build both need MinGW-w64. The runner image ships
      # one, but its location has moved between images -- probe, then fall back
      # to installing it. Entries written to GITHUB_PATH are *prepended*, so
      # this g++ wins over Strawberry Perl's.
      - name: Locate MinGW-w64
        shell: pwsh
        run: |
          $probe = @(
            'C:\msys64\ucrt64\bin'
            'C:\msys64\mingw64\bin'
            'C:\mingw64\bin'
            'C:\ProgramData\mingw64\mingw64\bin'
          )
          $bin = $probe | Where-Object { Test-Path (Join-Path $_ 'g++.exe') } | Select-Object -First 1
          if (-not $bin) {
            Write-Host 'no MinGW on the image; installing'
            choco install mingw --no-progress --yes
            $bin = @(
              'C:\ProgramData\mingw64\mingw64\bin'
              'C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin'
            ) | Where-Object { Test-Path (Join-Path $_ 'g++.exe') } | Select-Object -First 1
          }
          if (-not $bin) { throw 'MinGW-w64 g++ not found' }
          Add-Content -Path $env:GITHUB_PATH -Value $bin
          Write-Host "using $bin"

      - name: Verify toolchain
        shell: pwsh
        run: |
          g++ --version
          ar --version | Select-Object -First 1
          go env CC CGO_ENABLED

      # libraw.a takes several minutes to compile. setup-libraw.ps1 exits early
      # when the artifact is already present, so a cache hit skips the build.
      - name: Cache LibRaw
        uses: actions/cache@v4
        with:
          path: |
            third_party/libraw
            third_party/LibRaw-${{ env.LIBRAW_VERSION }}.tar.gz
          key: libraw-${{ runner.os }}-${{ env.LIBRAW_VERSION }}-${{ hashFiles('scripts/setup-libraw.ps1') }}

      - name: Build LibRaw
        run: npm run setup:libraw

      - name: Install dependencies
        run: |
          npm ci
          npm --prefix client ci

      - name: Generate API client
        run: npm run gen

      - name: Typecheck
        run: npm run typecheck

      - name: Vet daemon
        run: go build ./...

      # Not a tag: prove the installer builds, keep it as an artifact.
      - name: Build installer
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: npm run dist

      # A tag: build and upload to a *draft* GitHub Release. Nothing reaches
      # users -- and electron-updater sees nothing -- until you publish it.
      - name: Build and publish draft release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:publish

      - uses: actions/upload-artifact@v4
        with:
          name: marraw-windows
          path: |
            dist/*.exe
            dist/*.yml
          if-no-files-found: error

# ---------------------------------------------------------------------------
# macOS and Linux builds are UNTESTED at runtime: no physical test machine.
# CI proves they compile and package; users report whether they run.
#
# Both jobs `needs: windows` -- partly as a gate (the tag-version check lives
# there), partly so the Windows job creates the draft release alone before
# the other two race electron-builder's find-or-create-draft logic (v0.2.0
# already produced a split draft with a SINGLE job; see release notes ritual).
#
# NOTE: macOS auto-update requires a Developer ID signature -- Squirrel.Mac
# refuses to update an unsigned bundle. The unsigned .dmg installs (via
# right-click Open / "Open Anyway" in System Settings), it just never
# self-updates; the app hides the auto-update toggle on darwin. The Linux
# AppImage self-updates normally.
# ---------------------------------------------------------------------------

  linux:
    runs-on: ubuntu-22.04 # oldest supported image = oldest glibc users can run
    needs: windows
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json

      - name: Cache LibRaw
        uses: actions/cache@v4
        with:
          path: |
            third_party/libraw
            third_party/LibRaw-${{ env.LIBRAW_VERSION }}.tar.gz
          key: libraw-${{ runner.os }}-${{ env.LIBRAW_VERSION }}-${{ hashFiles('scripts/setup-libraw.sh') }}

      - name: Build LibRaw
        run: bash scripts/setup-libraw.sh

      - name: Install dependencies
        run: |
          npm ci
          npm --prefix client ci

      - name: Generate API client
        run: npm run gen

      - name: Vet daemon
        run: go build ./...

      # A CC0 sample RAW (raw.pixls.us) so the libraw tests exercise the real
      # decode pipeline on this otherwise-untested platform instead of skipping.
      # Must be a ~24MP-class file: the cancel/progress/fold-WB tests are
      # calibrated to real-world sizes and fail on small sensors even on
      # Windows (verified with a 12MP ILCE-7S sample).
      - name: Fetch sample RAW
        run: |
          mkdir -p /tmp/marraw-raw
          curl -fsSL --retry 3 -o /tmp/marraw-raw/sample.arw 'https://raw.pixls.us/getfile.php/2414/nice/Sony%20-%20ILCE-7M3%20-%2014bit%2014bit%20compressed%20(3:2).ARW'
          echo '250784580ea527442c09004417bb0eead484f2bf3ee8f9121a776ac65bb50d0f  /tmp/marraw-raw/sample.arw' | shasum -a 256 -c -

      - name: Test daemon
        env:
          MARRAW_TEST_RAW_DIR: /tmp/marraw-raw
        run: go test ./...

      - name: Build installer
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: npm run dist

      - name: Build and publish draft release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:publish

      - uses: actions/upload-artifact@v4
        with:
          name: marraw-linux
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.yml
          if-no-files-found: error

  macos:
    runs-on: macos-15 # arm64 (Apple Silicon) only for now
    needs: windows
    env:
      # No signing certificate: stop electron-builder from probing the
      # keychain and stalling or failing on whatever it finds there.
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json

      - name: Cache LibRaw
        uses: actions/cache@v4
        with:
          path: |
            third_party/libraw
            third_party/LibRaw-${{ env.LIBRAW_VERSION }}.tar.gz
          key: libraw-${{ runner.os }}-${{ env.LIBRAW_VERSION }}-${{ hashFiles('scripts/setup-libraw.sh') }}

      - name: Build LibRaw
        run: bash scripts/setup-libraw.sh

      - name: Install dependencies
        run: |
          npm ci
          npm --prefix client ci

      - name: Generate API client
        run: npm run gen

      - name: Vet daemon
        run: go build ./...

      # A CC0 sample RAW (raw.pixls.us) so the libraw tests exercise the real
      # decode pipeline on this otherwise-untested platform instead of skipping.
      # Must be a ~24MP-class file: the cancel/progress/fold-WB tests are
      # calibrated to real-world sizes and fail on small sensors even on
      # Windows (verified with a 12MP ILCE-7S sample).
      - name: Fetch sample RAW
        run: |
          mkdir -p /tmp/marraw-raw
          curl -fsSL --retry 3 -o /tmp/marraw-raw/sample.arw 'https://raw.pixls.us/getfile.php/2414/nice/Sony%20-%20ILCE-7M3%20-%2014bit%2014bit%20compressed%20(3:2).ARW'
          echo '250784580ea527442c09004417bb0eead484f2bf3ee8f9121a776ac65bb50d0f  /tmp/marraw-raw/sample.arw' | shasum -a 256 -c -

      - name: Test daemon
        env:
          MARRAW_TEST_RAW_DIR: /tmp/marraw-raw
        run: go test ./...

      - name: Build installer
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: npm run dist

      - name: Build and publish draft release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:publish

      - uses: actions/upload-artifact@v4
        with:
          name: marraw-macos
          path: |
            dist/*.dmg
            dist/*.yml
          if-no-files-found: error
